<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Square frame (transparent fill on dark bg) -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#FAF7F2" stroke-width="1.5"/>

  <!-- Bold italic serif S in paper -->
  <text x="28" y="46" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="700" font-size="42" fill="#FAF7F2">S</text>

  <!-- Terracotta period — slightly lighter for dark bg -->
  <circle cx="46" cy="42" r="3" fill="#DA8E6B"/>
</svg>
