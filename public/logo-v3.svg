<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Square frame -->
  <rect x="2" y="2" width="60" height="60" fill="#FAF7F2" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Bold italic serif S, centered -->
  <text x="28" y="46" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="700" font-size="42" fill="#1A1A1A">S</text>

  <!-- Terracotta period — confident editorial "stop" -->
  <circle cx="46" cy="42" r="3" fill="#C8552F"/>
</svg>
