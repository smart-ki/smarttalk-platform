<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Outer circle: paper background with ink stroke -->
  <circle cx="28" cy="28" r="26" fill="#FAF7F2" stroke="#1A1A1A" stroke-width="1.2"/>
  <!-- Inner italic serif S -->
  <text x="28" y="40" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="500" font-size="32" fill="#1A1A1A">S</text>
  <!-- Terracotta accent dot top-right -->
  <circle cx="44" cy="14" r="3.5" fill="#C8552F"/>
  <!-- Subtle thin line under S -->
  <line x1="20" y1="43" x2="36" y2="43" stroke="#C8552F" stroke-width="1" opacity="0.6"/>
</svg>
